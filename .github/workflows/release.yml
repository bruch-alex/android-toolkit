name: Release
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:

  build-linux-deb:
    runs-on: ubuntu-latest
    outputs:
      artifact-path: ${{ steps.build-linux.outputs.artifact-path }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: 25
          java-package: 'jdk+fx'

      - name: Build project
        run: mvn clean package

      - name: Prepare JAR
        run: cp target/*.jar target/app.jar

      - name: Package app
        run: jpackage \
          --type deb \
          --name AndroidToolkit \
          --app-version 0.0.1 \
          --input target \
          --main-jar app.jar \
          --main-class app.androidtoolkit.Launcher \
          --dest dist \
          --linux-shortcut \
          --linux-menu-group "Development" \
          --java-options "--enable-native-access=ALL-UNNAMED"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: 25
          java-package: jdk+fx

      - name: Build project
        run: mvn clean package

      - name: Prepare JAR
        run: |
          cp target/*.jar target/app.jar

      - name: Create Windows EXE
        shell: pwsh
        run: |
          jpackage `
            --name AndroidToolkit `
            --win-dir-chooser `
            --win-per-user-install `
            --win-console `
            --win-shortcut `
            --input target `
            --main-jar app.jar `
            --main-class app.androidtoolkit.Launcher `
            --dest dist `
            --java-options "--enable-native-access=ALL-UNNAMED"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/
